<div id="pun-main" class="main">
  <div class="main-header">
    <h1>Settings</h1>
  </div>
  <div class="main-content">
    <form id="settings-form" class="container" (submit)="onSubmit($event)">
      <fieldset>
        <legend>Profile</legend>
        <div class="fs-box avatar-setting">
          <div class="current-avatar">
            <img [src]="avatarUrl" alt="Current Avatar">
          </div>
          <div class="avatar-input">
            <label for="avatar_url">Avatar URL</label><br />
            <span class="input"><input id="avatar_url" type="text" name="avatar_url" [(ngModel)]="avatarUrl" /></span>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Localization</legend>
        <div class="fs-box">
          <p class="inputfield">
            <label for="language">Language</label><br />
            <span class="input">
              <select id="language" name="language" [(ngModel)]="language">
                <option value="en-US">English</option>
                <option value="ru-RU">Russian</option>
              </select>
            </span>
          </p>
          <p class="inputfield">
            <label for="timezone">Timezone</label><br />
            <span class="input">
              <select id="timezone" name="timezone" [(ngModel)]="timezone">
                @for (tz of timezones; track tz) {
                  <option [value]="tz">{{ tz }}</option>
                }
              </select>
            </span>
          </p>
        </div>
      </fieldset>

      <fieldset>
        <legend>Change Password</legend>
        <div class="fs-box">
          <p class="inputfield">
            <label for="old_password">Old Password</label><br />
            <span class="input"><input id="old_password" type="password" name="old_password" [(ngModel)]="oldPassword" /></span>
          </p>
          <p class="inputfield">
            <label for="new_password">New Password</label><br />
            <span class="input"><input id="new_password" type="password" name="new_password" [(ngModel)]="newPassword" /></span>
          </p>
          <p class="inputfield">
            <label for="confirm_password">Confirm New Password</label><br />
            <span class="input"><input id="confirm_password" type="password" name="confirm_password" [(ngModel)]="confirmPassword" /></span>
          </p>
        </div>
      </fieldset>

      <p class="formsubmit"><input type="submit" class="button submit" value="Save Settings" /></p>
    </form>
  </div>
</div>

<app-breadcrumbs [items]="[
  { label: 'Admin', link: '/admin' },
  { label: 'Custom Templates', link: '/admin/frontend-templates' },
  { label: name() }
]" />

<div class="template-container">
  <div class="template-header">
    <div class="header-title">
      <h2>
        {{ name() }}
        @if (readonly()) {
          <span class="badge-readonly" i18n="@@admin.componentTemplate.readonlyBadge">default</span>
        }
      </h2>
      @if (filePath()) {
        <code class="file-path">{{ filePath() }}</code>
      }
    </div>
    @if (!readonly()) {
      <app-save-button [state]="saveState()" (clicked)="save()">
        <span i18n="@@common.save">Save</span>
      </app-save-button>
    }
  </div>

  <div class="editor-wrap" [class.editor-wrap--readonly]="readonly()">
    <app-html-editor
      [value]="content()"
      [readonly]="readonly()"
      (valueChange)="updateContent($event)"
    />
  </div>
</div>

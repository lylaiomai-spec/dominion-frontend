<div class="character-template-edit">
  <h2 i18n="@@admin.characterprofiletemplates">Character Profile Template</h2>

  <form (submit)="saveTemplate(); $event.preventDefault()">
    @for (field of fields; track field.id; let i = $index) {
      <fieldset>
        <legend>Field {{ i + 1 }}</legend>

        <div class="form-row">
          <div class="form-field">
            <label [for]="'machine-name-' + i" i18n="@@templateEdit.machineFieldName">Machine Field Name:</label>
            <input
              [id]="'machine-name-' + i"
              type="text"
              name="machine_field_name_{{ i }}"
              [(ngModel)]="field.machine_field_name"
              placeholder="e.g., biography">
          </div>

          <div class="form-field">
            <label [for]="'human-name-' + i" i18n="@@templateEdit.humanFieldName">Human Field Name:</label>
            <input
              [id]="'human-name-' + i"
              type="text"
              name="human_field_name_{{ i }}"
              [(ngModel)]="field.human_field_name"
              placeholder="e.g., Biography">
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label [for]="'field-type-' + i" i18n="@@templateEdit.fieldType">Field Type:</label>
            <select
              [id]="'field-type-' + i"
              name="field_type_{{ i }}"
              [(ngModel)]="field.field_type">
              @for (type of fieldTypes; track type) {
                <option [value]="type">{{ type }}</option>
              }
            </select>
          </div>

          <div class="form-field">
            <label [for]="'content-type-' + i" i18n="@@templateEdit.contentFieldType">Content Field Type:</label>
            <select
              [id]="'content-type-' + i"
              name="content_field_type_{{ i }}"
              [(ngModel)]="field.content_field_type">
              @for (type of contentFieldTypes; track type) {
                <option [value]="type">{{ type }}</option>
              }
            </select>
          </div>

          <div class="form-field">
            <label [for]="'order-' + i" i18n="@@templateEdit.order">Order:</label>
            <input
              [id]="'order-' + i"
              type="number"
              name="order_{{ i }}"
              [(ngModel)]="field.order">
          </div>
        </div>

        <div class="fieldset-actions">
          <button type="button" (click)="removeField(i)" class="btn-danger" i18n="@@common.delete">Remove</button>
        </div>
      </fieldset>
    }

    <div class="form-actions">
      <button type="button" (click)="addEmptyField()" class="btn-secondary" i18n="@@templateEdit.addField">Add Field</button>
      <button type="submit" [class]="'btn-save btn-save--' + saveState()" [disabled]="saveState() === 'loading'">
        @switch (saveState()) {
          @case ('loading') { <span class="spinner"></span> }
          @case ('success') { <span i18n="@@common.saved">Saved</span> }
          @case ('error') { <span i18n="@@common.saveFailed">Failed</span> }
          @default { <span i18n="@@common.save">Save</span> }
        }
      </button>
    </div>
  </form>
</div>

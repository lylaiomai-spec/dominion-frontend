@if (draft(); as draft) {
  <h2 i18n="@@adminDesignDraftEdit.title">Edit Design Draft</h2>

  <div style="display: flex; align-items: center; gap: 16px;">
    <a (click)="openPreview()" style="cursor: pointer;" i18n="@@adminDesignDraftEdit.openPreview">Open Preview</a>
    <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
      <input type="checkbox" [ngModel]="autoSave()" (ngModelChange)="autoSave.set($event)" name="autoSave" />
      <span i18n="@@adminDesignDraftEdit.autoSave">Auto-save</span>
    </label>
  </div>

  <div style="display: flex; flex-direction: column; gap: 16px; margin-top: 16px;">
    <label>
      <span i18n="@@adminDesignDraftEdit.name">Name</span>
      <input type="text" [(ngModel)]="draft.name" name="name" style="display: block; width: 100%; margin-top: 4px;" />
    </label>

    <div>
      <span>main_style.css</span>
      <app-css-editor [value]="draft.main_css" (valueChange)="updateMainCss($event)" style="display: block; margin-top: 4px;"></app-css-editor>
    </div>

    <div>
      <span>custom_style.css</span>
      <app-css-editor [value]="draft.custom_style_css" (valueChange)="updateCustomStyleCss($event)" style="display: block; margin-top: 4px;"></app-css-editor>
    </div>

    <div>
      <button class="button" (click)="save()" [disabled]="saveState() === 'loading'">
        @switch (saveState()) {
          @case ('loading') { <span i18n="@@common.saving">Saving…</span> }
          @case ('success') { <span i18n="@@common.saved">Saved</span> }
          @case ('error') { <span i18n="@@common.saveFailed">Failed</span> }
          @default { <span i18n="@@common.save">Save</span> }
        }
      </button>
    </div>
  </div>
}
